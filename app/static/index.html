<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Vehicle Image Pipeline — Console</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #14161a;
    --panel: #1c1f25;
    --panel-2: #23262d;
    --line: #33373f;
    --text: #edeef0;
    --text-muted: #9aa0a8;
    --amber: #f2a93b;
    --amber-dim: #7a5b26;
    --pass: #4caf7d;
    --fail: #e0574a;
    --pending: #6b7280;
  }
  *{ box-sizing: border-box; }
  body{
    margin:0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', system-ui, sans-serif;
    min-height: 100vh;
  }
  header{
    border-bottom: 1px solid var(--line);
    padding: 20px 28px;
    display:flex;
    align-items:baseline;
    gap: 14px;
  }
  header h1{
    font-family:'Oswald', sans-serif;
    font-weight:700;
    font-size: 22px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    margin:0;
  }
  header .tag{
    font-family:'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--amber);
    border: 1px solid var(--amber-dim);
    padding: 2px 8px;
    border-radius: 3px;
  }
  main{
    max-width: 900px;
    margin: 0 auto;
    padding: 32px 24px 80px;
  }

  #dropzone{
    border: 2px dashed var(--line);
    border-radius: 10px;
    padding: 40px 20px;
    text-align:center;
    cursor:pointer;
    transition: border-color .15s ease, background .15s ease;
    background: var(--panel);
  }
  #dropzone:hover, #dropzone.drag{
    border-color: var(--amber);
    background: var(--panel-2);
  }
  #dropzone .big{
    font-family:'Oswald', sans-serif;
    font-size: 17px;
    letter-spacing:.03em;
    text-transform: uppercase;
    color: var(--text);
  }
  #dropzone .small{
    font-family:'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 6px;
  }
  #fileInput{ display:none; }

  #queue{
    margin-top: 32px;
    display:flex;
    flex-direction:column;
    gap: 14px;
  }

  .card{
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 10px;
    overflow:hidden;
  }
  .card-head{
    display:flex;
    align-items:center;
    gap: 12px;
    padding: 14px 18px;
    cursor:pointer;
  }
  .thumb{
    width: 46px; height: 46px;
    border-radius: 6px;
    object-fit: cover;
    background: var(--panel-2);
    flex-shrink:0;
    border: 1px solid var(--line);
  }
  .meta{ flex:1; min-width:0; }
  .meta .name{
    font-size: 14px;
    font-weight: 500;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .meta .id{
    font-family:'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
  }
  .badge{
    font-family:'IBM Plex Mono', monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: .05em;
    padding: 4px 10px;
    border-radius: 20px;
    white-space:nowrap;
    border: 1px solid transparent;
  }
  .badge.pending{ color: var(--pending); border-color: var(--pending); }
  .badge.processing{ color: var(--amber); border-color: var(--amber-dim); animation: pulse 1.4s infinite; }
  .badge.completed{ color: var(--pass); border-color: #2f6b4c; }
  .badge.failed{ color: var(--fail); border-color: #7a3129; }
  @keyframes pulse{ 0%,100%{ opacity:1; } 50%{ opacity:.4; } }

  .chev{ color: var(--text-muted); font-size: 12px; transition: transform .15s ease; }
  .card.open .chev{ transform: rotate(90deg); }

  .results{
    display:none;
    border-top: 1px solid var(--line);
    padding: 4px 18px 16px;
  }
  .card.open .results{ display:block; }

  .check-row{
    display:flex;
    align-items:center;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid var(--line);
  }
  .check-row:last-child{ border-bottom:none; }

  .check-name{
    font-family:'IBM Plex Mono', monospace;
    font-size: 12px;
    width: 190px;
    flex-shrink:0;
    color: var(--text-muted);
  }
  .strip{
    display:flex;
    gap: 2px;
    flex-shrink:0;
  }
  .seg{
    width: 6px; height: 16px;
    background: var(--line);
    border-radius: 1px;
  }
  .seg.on.pass{ background: var(--pass); }
  .seg.on.fail{ background: var(--fail); }

  .check-detail{
    font-size: 12.5px;
    color: var(--text-muted);
    flex:1;
    line-height:1.4;
  }
  .check-detail .verdict{
    font-weight:600;
  }
  .check-detail .verdict.pass{ color: var(--pass); }
  .check-detail .verdict.fail{ color: var(--fail); }

  .failure-reason{
    font-family:'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--fail);
    padding: 10px 0 4px;
  }

  #empty{
    text-align:center;
    color: var(--text-muted);
    font-family:'IBM Plex Mono', monospace;
    font-size: 13px;
    padding: 30px 0 0;
  }
</style>
</head>
<body>

<header>
  <h1>Image Pipeline</h1>
  <span class="tag">Field Inspection Console</span>
</header>

<main>
  <div id="dropzone">
    <div class="big">Drop a vehicle photo, or click to upload</div>
    <div class="small">JPG · PNG · WEBP — processed asynchronously</div>
    <input type="file" id="fileInput" accept=".jpg,.jpeg,.png,.webp" />
  </div>

  <div id="queue"></div>
  <div id="empty">No images uploaded yet this session.</div>
</main>

<script>
const dropzone = document.getElementById('dropzone');
const fileInput = document.getElementById('fileInput');
const queueEl = document.getElementById('queue');
const emptyEl = document.getElementById('empty');

const CHECK_LABELS = {
  blur_detection: 'BLUR',
  brightness_analysis: 'BRIGHTNESS',
  screenshot_detection: 'SCREENSHOT',
  tamper_heuristic: 'TAMPER',
  plate_format_validation: 'PLATE FORMAT',
  duplicate_detection: 'DUPLICATE',
};

dropzone.addEventListener('click', () => fileInput.click());
dropzone.addEventListener('dragover', (e) => { e.preventDefault(); dropzone.classList.add('drag'); });
dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag'));
dropzone.addEventListener('drop', (e) => {
  e.preventDefault();
  dropzone.classList.remove('drag');
  if (e.dataTransfer.files.length) handleUpload(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', () => {
  if (fileInput.files.length) handleUpload(fileInput.files[0]);
  fileInput.value = '';
});

function segStrip(confidence, passed) {
  const total = 10;
  const on = Math.round(confidence * total);
  let html = '';
  for (let i = 0; i < total; i++) {
    const active = i < on;
    html += `<div class="seg ${active ? 'on ' + (passed ? 'pass' : 'fail') : ''}"></div>`;
  }
  return html;
}

async function handleUpload(file) {
  const previewUrl = URL.createObjectURL(file);
  const card = createCard(file.name, previewUrl);
  queueEl.prepend(card.el);
  emptyEl.style.display = 'none';

  const form = new FormData();
  form.append('file', file);

  let res;
  try {
    res = await fetch('/images', { method: 'POST', body: form });
  } catch (err) {
    card.setBadge('failed');
    card.setFailure('Could not reach the API: ' + err.message);
    return;
  }

  if (!res.ok) {
    const body = await res.json().catch(() => ({}));
    card.setBadge('failed');
    card.setFailure(body.detail || `Upload rejected (HTTP ${res.status})`);
    return;
  }

  const data = await res.json();
  card.setId(data.id);
  card.setBadge(data.status);
  poll(data.id, card);
}

function poll(id, card) {
  const interval = setInterval(async () => {
    let res;
    try {
      res = await fetch(`/images/${id}/status`);
    } catch (err) { return; }
    if (!res.ok) return;
    const data = await res.json();
    card.setBadge(data.status);

    if (data.status === 'completed') {
      clearInterval(interval);
      const resultsRes = await fetch(`/images/${id}/results`);
      const results = await resultsRes.json();
      card.setResults(results.results);
    } else if (data.status === 'failed') {
      clearInterval(interval);
      card.setFailure(data.failure_reason || 'Processing failed for an unknown reason.');
    }
  }, 1200);
}

function createCard(filename, previewUrl) {
  const el = document.createElement('div');
  el.className = 'card';
  el.innerHTML = `
    <div class="card-head">
      <img class="thumb" src="${previewUrl}" />
      <div class="meta">
        <div class="name">${filename}</div>
        <div class="id">queued</div>
      </div>
      <span class="badge pending">pending</span>
      <span class="chev">&#9656;</span>
    </div>
    <div class="results"></div>
  `;
  const head = el.querySelector('.card-head');
  const badge = el.querySelector('.badge');
  const idEl = el.querySelector('.id');
  const resultsEl = el.querySelector('.results');

  head.addEventListener('click', () => el.classList.toggle('open'));

  return {
    el,
    setId(id) { idEl.textContent = id; },
    setBadge(status) {
      badge.className = 'badge ' + status;
      badge.textContent = status;
    },
    setFailure(reason) {
      resultsEl.innerHTML = `<div class="failure-reason">✕ ${reason}</div>`;
    },
    setResults(results) {
      resultsEl.innerHTML = results.map(r => `
        <div class="check-row">
          <div class="check-name">${CHECK_LABELS[r.check_name] || r.check_name}</div>
          <div class="strip">${segStrip(r.confidence, r.passed)}</div>
          <div class="check-detail">
            <span class="verdict ${r.passed ? 'pass' : 'fail'}">${r.passed ? 'PASS' : 'FLAGGED'}</span>
            — ${r.detail || ''}
          </div>
        </div>
      `).join('');
      el.classList.add('open');
    }
  };
}
</script>

</body>
</html>
